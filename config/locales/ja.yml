ja:
  date:
    formats:
      default: "%Y年%m月%d日"
      short: "%m/%d"
      long: "%Y年%m月%d日(%a)"
    day_names: [日曜日, 月曜日, 火曜日, 水曜日, 木曜日, 金曜日, 土曜日]
    abbr_day_names: [日, 月, 火, 水, 木, 金, 土]
    month_names: [~, 1月, 2月, 3月, 4月, 5月, 6月, 7月, 8月, 9月, 10月, 11月, 12月]
    abbr_month_names: [~, 1月, 2月, 3月, 4月, 5月, 6月, 7月, 8月, 9月, 10月, 11月, 12月]
    order: [year, month, day]

  time:
    formats:
      default: "%Y年%m月%d日(%a) %H時%M分%S秒 %z"
      short: "%m/%d %H:%M"
      long: "%Y年%m月%d日(%a) %H時%M分%S秒"
      time_only: "%H:%M"
    am: "午前"
    pm: "午後"

  number:
    format:
      separator: "."
      delimiter: ","
      precision: 3
    currency:
      format:
        unit: "円"
        format: "%n%u"
        delimiter: ","
        separator: "."
        precision: 0

  support:
    array:
      words_connector: "、"
      two_words_connector: "と"
      last_word_connector: "、"
      or:
        words_connector: "、"
        two_words_connector: "か"
        last_word_connector: "、"

  errors:
    format: "%{attribute}%{message}"
    messages:
      not_saved:
        one: "1件のエラーにより保存できませんでした:"
        other: "%{count}件のエラーにより保存できませんでした:"
      accepted: "を受諾してください"
      blank: "を入力してください"
      confirmation: "が一致しません"
      empty: "を入力してください"
      equal_to: "は%{count}にしてください"
      even: "は偶数にしてください"
      exclusion: "は予約されています"
      greater_than: "は%{count}より大きい値にしてください"
      greater_than_or_equal_to: "は%{count}以上の値にしてください"
      inclusion: "は一覧にありません"
      invalid: "は不正な値です"
      less_than: "は%{count}より小さい値にしてください"
      less_than_or_equal_to: "は%{count}以下の値にしてください"
      not_a_number: "は数値で入力してください"
      not_an_integer: "は整数で入力してください"
      odd: "は奇数にしてください"
      other_than: "は%{count}以外の値にしてください"
      present: "は入力しないでください"
      required: "を入力してください"
      taken: "はすでに使用されています"
      too_long: "は%{count}文字以内で入力してください"
      too_short: "は%{count}文字以上で入力してください"
      wrong_length: "は%{count}文字で入力してください"

  activerecord:
    errors:
      messages:
        record_invalid: "バリデーションに失敗しました: %{errors}"
        restrict_dependent_destroy:
          has_one: "%{record}が存在するため削除できません"
          has_many: "%{record}が存在するため削除できません"
    attributes:
      user:
        email: "メールアドレス"
        password: "パスワード"
        password_confirmation: "パスワード（確認）"
        current_password: "現在のパスワード"
        name: "名前"
        role: "ロール"
        remember_me: "ログイン状態を保存する"
      adl_record:
        recorded_at: "記録日時"
        urination_count: "排尿回数"
      care_document:
        document_type: "書類の種類"
        file: "ファイル"
        valid_from: "有効期限（開始）"
        valid_until: "有効期限（終了）"
      care_plan:
        created_on: "計画作成日"
      care_recipient:
        care_level: "介護度"
        gender: "性別"
      comment:
        body: "内容"
      emergency_contact:
        name: "氏名"
        phone_number: "電話番号"
      family_membership:
        user: "ユーザー"
        user_id: "ユーザー"
      medication_record:
