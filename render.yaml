services:
  - type: web
    name: caregiving-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: caregiving-app-db
          property: connectionString
      # S3-compatible storage (e.g. Cloudflare R2) so uploaded files (photos, care
      # documents) survive redeploys instead of living on the free web service's
      # ephemeral disk. `sync: false` means Render won't store these values in this
      # file — set them once in the Render dashboard's Environment tab. Leaving them
      # unset keeps the app on local disk storage exactly as before (see production.rb).
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_REGION
        sync: false
      # メール送信（アラート通知・パスワード再設定など）用のSMTP設定。SMTP_ADDRESSが
      # 未設定の間はメール配信自体が無効なまま（production.rb参照）。設定するとすぐ有効になる。
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER_NAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_DOMAIN
        sync: false
      - key: MAIL_FROM
        sync: false
      # 外部の無料cronサービスから日次アラートメールを起動させるための共有シークレット。
      - key: ALERT_NOTIFICATION_SECRET
        generateValue: true

databases:
  - name: caregiving-app-db
    plan: free
    databaseName: caregiving_app_production
    user: caregiving_app
